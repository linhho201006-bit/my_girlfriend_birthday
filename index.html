<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Girlfriend's Birthday 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Pacifico&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0f0a1a;
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== PARTICLES ===== */
  canvas#particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== SCREENS ===== */
  .screen {
    position: relative;
    z-index: 10;
    display: none;
    width: 100%;
    height: 100vh;
    align-items: center;
    justify-content: center;
  }
  .screen.active { display: flex; }

  /* ===== PIN SCREEN ===== */
  .pin-card {
    background: rgba(60, 20, 40, 0.82);
    backdrop-filter: blur(16px);
    border-radius: 28px;
    padding: 44px 48px 36px;
    width: 360px;
    text-align: center;
    box-shadow: 0 8px 60px rgba(220, 80, 120, 0.18), 0 2px 24px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.07);
    animation: fadeIn .6s ease;
  }

  .pin-title {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, #ff8fab, #ff4d7a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .pin-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.25);
    transition: all .2s;
  }
  .pin-dot.filled {
    background: linear-gradient(135deg, #ff8fab, #ff4d7a);
    border-color: #ff4d7a;
    box-shadow: 0 0 10px rgba(255,77,122,0.6);
  }
  .pin-dot.shake {
    animation: shake .4s ease;
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .num-btn {
    background: rgba(255,255,255,0.09);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 22px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    padding: 18px 0;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .num-btn:hover { background: rgba(255,255,255,0.16); transform: scale(1.04); }
  .num-btn:active { transform: scale(0.96); background: rgba(255,77,122,0.3); }
  .num-btn.delete {
    color: #ff4d7a;
    font-size: 20px;
  }
  .num-btn.zero { grid-column: 2; }

  .pin-hint {
    color: rgba(255,255,255,0.38);
    font-size: 13px;
    margin-top: 4px;
  }
  .pin-error {
    color: #ff4d7a;
    font-size: 13px;
    margin-top: 4px;
    min-height: 18px;
    transition: opacity .3s;
  }

  /* ===== WELCOME SCREEN ===== */
  .welcome-card {
    background: rgba(18, 8, 28, 0.88);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    width: min(900px, 92vw);
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    box-shadow: 0 8px 70px rgba(220,80,120,0.18), 0 2px 24px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.07);
    animation: slideUp .8s cubic-bezier(.16,1,.3,1);
  }

  .welcome-left {
    padding: 60px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  .welcome-greeting {
    font-family: 'Pacifico', cursive;
    font-size: 32px;
    background: linear-gradient(135deg, #ff8fab, #ff4d7a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
  }

  .welcome-msg {
    color: rgba(255,255,255,0.88);
    font-size: 16px;
    line-height: 1.7;
    font-weight: 500;
  }

  .welcome-typewriter {
    color: rgba(255,255,255,0.88);
    font-size: 15px;
    min-height: 26px;
    font-weight: 500;
  }
  .cursor { display: inline-block; animation: blink 1s infinite; }

  .welcome-hint {
    color: rgba(255,255,255,0.38);
    font-size: 13px;
    margin-top: 8px;
  }

  .welcome-right {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.3);
    padding: 40px;
  }

  /* ===== SRCATCH WRAPPER với lắc tự động ===== */
  .photo-frame {
    position: relative;
    width: 260px;
    height: 300px;
    border-radius: 16px;
    background:linear-gradient(135deg, #fff 0%, #e8e8e8 100%);
    padding: 12px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2);
    animation: swing 3s ease-in-out infinite;
    transform: top center;
  }

  .photo-frame:hover {
    animation-play-state: paused;
    transform:scale(1.04);
  }

  /* ===== Lac qua lai ===== */
  @keyframes swing {
    0%   { transform: rotate(-4deg); }
    25%  { transform: rotate(0deg); }
    50%  { transform: rotate(4deg); }
    75%  { transform: rotate(0deg); }
    100% { transform: rotate(-4deg); }
  }

  .photo-inner {
    width: 100%;
    height: 100%;
    border-radius: 8px;
    background: linear-gradient(135deg, #2a1a3e, #1a0a28);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    text-align: center;
  }
  .photo-inner img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }

  /* ===== MUSIC BUTTON ===== */
  .music-btn {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 100;
    background: rgba(20, 10, 30, 0.92);
    border: none;
    border-radius: 30px;
    padding: 10px 20px 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: #fff;
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: all .2s;
    text-decoration: none;
  }
  .music-btn:hover { transform: scale(1.04); background: rgba(30,15,45,0.96); }

  .yt-icon {
    width: 34px; height: 24px;
    background: #ff0000;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .2s;
  }
  .music-btn.playing .yt-icon { background: #cc0000; }
  .yt-icon svg { width: 14px; height: 14px; fill: #fff; }
  .music-note { font-size: 13px; opacity: .8; }

  /* Pulse animation when playing */
  .music-btn.playing { animation: pulse-btn 2s infinite; }
  @keyframes pulse-btn {
    0%,100% { box-shadow: 0 4px 20px rgba(255,0,0,0.3); }
    50% { box-shadow: 0 4px 28px rgba(255,0,0,0.55), 0 0 0 4px rgba(255,0,0,0.12); }
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeIn { from { opacity:0; transform: scale(.94); } to { opacity:1; transform: scale(1); } }
  @keyframes slideUp { from { opacity:0; transform: translateY(40px); } to { opacity:1; transform: translateY(0); } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  /* ===== CONFETTI OVERLAY ===== */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity .5s;
  }
  #confetti-canvas.active { opacity: 1; }

  /* Hidden YouTube iframe */
  #yt-player {
    position: absolute;
    width: 1px; height: 1px;
    opacity: 0;
    pointer-events: none;
    top: -9999px;
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<canvas id="confetti-canvas"></canvas>

<!-- ===== PIN SCREEN ===== -->
<div class="screen active" id="pin-screen">
  <div class="pin-card">
    <div class="pin-title">Hôm nay là ngày gì vậy ta 💕</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="addDigit('1')">1</button>
      <button class="num-btn" onclick="addDigit('2')">2</button>
      <button class="num-btn" onclick="addDigit('3')">3</button>
      <button class="num-btn" onclick="addDigit('4')">4</button>
      <button class="num-btn" onclick="addDigit('5')">5</button>
      <button class="num-btn" onclick="addDigit('6')">6</button>
      <button class="num-btn" onclick="addDigit('7')">7</button>
      <button class="num-btn" onclick="addDigit('8')">8</button>
      <button class="num-btn" onclick="addDigit('9')">9</button>
      <button class="num-btn zero" onclick="addDigit('0')">0</button>
      <button class="num-btn delete" onclick="deleteDigit()">✕</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-hint">Gợi ý: Ngày đặc biệt của Linh</div>
  </div>
</div>

<!-- ===== WELCOME SCREEN ===== -->
<div class="screen" id="welcome-screen">
  <div class="welcome-card">
    <div class="welcome-left">
      <div class="welcome-greeting">Chào công chúa 👸</div>
      <div class="welcome-msg">Chúc Mừng Sinh Nhật nhé ! 🎂🎉</div>
      <div class="welcome-typewriter" id="typewriter"><span class="cursor">|</span></div>
    </div>
    <div class="welcome-right">
      <div class="photo-frame">
        <div class="photo-inner">
            <img src="mygirlfriend.jpg" alt="photo">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== MUSIC BUTTON ===== -->
<button class="music-btn" id="music-btn" onclick="toggleMusic()">
  <div class="yt-icon">
    <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
  </div>
  <span>Play Music</span>
  <span class="music-note">🎵</span>
</button>

<!-- Local MP3 Audio -->>
 <audio id="audio-player" loop>
    <source src="Happy Birthday to You.mp3" type="audio/mpeg">
 </audio>

<script>
// ===========================
// PARTICLES
// ===========================
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

const PARTICLE_COUNT = 120;
const particles = [];

function randomColor() {
  const colors = [
    'rgba(255,143,171,', 'rgba(255,77,122,', 'rgba(200,150,255,',
    'rgba(255,200,220,', 'rgba(180,100,200,', 'rgba(255,255,255,'
  ];
  return colors[Math.floor(Math.random() * colors.length)];
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H + H,
    r: Math.random() * 2.5 + 0.5,
    speed: Math.random() * 0.6 + 0.2,
    opacity: Math.random() * 0.7 + 0.2,
    color: randomColor(),
    drift: (Math.random() - 0.5) * 0.4,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: Math.random() * 0.03 + 0.01,
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) {
    p.y -= p.speed;
    p.x += p.drift;
    p.twinkle += p.twinkleSpeed;
    const alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.twinkle));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color + alpha + ')';
    ctx.fill();
    if (p.y < -10) {
      p.y = H + 10;
      p.x = Math.random() * W;
    }
    if (p.x < -10 || p.x > W + 10) {
      p.x = Math.random() * W;
      p.y = H + 10;
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ===========================
// PIN LOGIC
// ===========================
// Đổi mật khẩu tại đây ↓ (mặc định: 0609 - ngày kỷ niệm)
const CORRECT_PIN = '2409';
let currentPin = '';

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.classList.toggle('filled', i < currentPin.length);
  }
}

function addDigit(d) {
  if (currentPin.length >= 4) return;
  currentPin += d;
  updateDots();
  if (currentPin.length === 4) {
    setTimeout(checkPin, 200);
  }
}

function deleteDigit() {
  currentPin = currentPin.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function checkPin() {
  if (currentPin === CORRECT_PIN) {
    showWelcome();
  } else {
    document.getElementById('pin-error').textContent = '❌ Sai rồi, thử lại nhé!';
    const dots = document.querySelectorAll('.pin-dot');
    dots.forEach(d => d.classList.add('shake'));
    setTimeout(() => {
      dots.forEach(d => d.classList.remove('shake'));
      currentPin = '';
      updateDots();
    }, 500);
  }
}

function showWelcome() {
  document.getElementById('pin-screen').classList.remove('active');
  const ws = document.getElementById('welcome-screen');
  ws.classList.add('active');
  startTypewriter();
  startConfetti();
  // Tu phat nhac khi nhap dung password
  audioPlayer.play().catch(() => {});
}

// ===========================
// TYPEWRITER
// ===========================
const messages = [
  'Chúc cô bé của Linh tuổi mới vui vẻ nha! 🎂',
  'Mong em ngày càng xinh đẹp, học giỏi, luôn hạnh phúc 💖',
  'Anh biết mình chưa tốt nhưng anh sẽ sửa đổi không để em phải buồn hay khóc nữa ✨',
  'Anh hi vọng mình sẽ bên nhau mãi về sau 👫',
  'Happy Birthday Baby! 🎉🥳',
];
let msgIdx = 0, charIdx = 0, typing = true;

function startTypewriter() {
  const el = document.getElementById('typewriter');
  function type() {
    const msg = messages[msgIdx];
    if (typing) {
      if (charIdx <= msg.length) {
        el.innerHTML = msg.slice(0, charIdx) + '<span class="cursor">|</span>';
        charIdx++;
        setTimeout(type, 70);
      } else {
        typing = false;
        setTimeout(type, 1800);
      }
    } else {
      if (charIdx > 0) {
        charIdx--;
        el.innerHTML = msg.slice(0, charIdx) + '<span class="cursor">|</span>';
        setTimeout(type, 35);
      } else {
        typing = true;
        msgIdx = (msgIdx + 1) % messages.length;
        setTimeout(type, 300);
      }
    }
  }
  type();
}

// ===========================
// CONFETTI
// ===========================
const confettiCanvas = document.getElementById('confetti-canvas');
const cctx = confettiCanvas.getContext('2d');
confettiCanvas.width = window.innerWidth;
confettiCanvas.height = window.innerHeight;
let confettiPieces = [];
let confettiActive = false;

function startConfetti() {
  confettiCanvas.classList.add('active');
  confettiActive = true;
  for (let i = 0; i < 80; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 200,
      w: Math.random() * 10 + 4,
      h: Math.random() * 6 + 3,
      color: ['#ff8fab','#ff4d7a','#ffb347','#fff','#c084fc','#67e8f9'][Math.floor(Math.random()*6)],
      speed: Math.random() * 3 + 1.5,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 4,
      drift: (Math.random() - 0.5) * 2,
    });
  }
  animateConfetti();
  setTimeout(() => {
    confettiCanvas.classList.remove('active');
    confettiActive = false;
    confettiPieces = [];
    cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }, 5000);
}

function animateConfetti() {
  if (!confettiActive) return;
  cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  for (const p of confettiPieces) {
    p.y += p.speed;
    p.x += p.drift;
    p.angle += p.spin;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate(p.angle * Math.PI / 180);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cctx.restore();
  }
  requestAnimationFrame(animateConfetti);
}

// ===========================
// LOCAL MP3 MUSIC
// ===========================
const audioPlayer = document.getElementById('audio-player'); // "2409" - thay bằng ID mong muốn
let isPlaying = false;

audioPlayer.addEventListener ('play', () => {
    isPlaying = true;
    document.getElementById('music-btn').classList.add('playing');
    document.querySelector('.music-btn span:not(.music-note)').textContent = 'playing...';
});

audioPlayer.addEventListener('pause', () => {
    isPlaying = false;
    document.getElementById('music-btn').classList.remove('playing');
    document.querySelector('.music-btn span:not(.music-note)').textContent = 'Play Music';
});


function toggleMusic() {
  if (isPlaying) {
    audioPlayer.pause();
  } else {
    audioPlayer.play().catch(() =>{});
  }
}
</script>
</body>
</html>
